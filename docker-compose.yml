services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: convert_track
      POSTGRES_PASSWORD: convert_track
      POSTGRES_MULTIPLE_DATABASES: convert_track,convert_track_test
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U convert_track"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
