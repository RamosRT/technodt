{% extends "base.html" %}
{% block content %}

{% if not operator %}
<div class="operator-prompt">
  <h2>Вход в систему</h2>
  <p>Введите ваше имя, чтобы продолжить</p>
  <form hx-post="/ui/operator" hx-target="body" hx-swap="outerHTML">
    <div class="form-row">
      <label for="op-name">Имя оператора</label>
      <input class="form-control" id="op-name" name="operator_name" required
             placeholder="Например: Иван Петров" autofocus>
    </div>
    <button class="btn btn-primary" style="width:100%">Войти</button>
  </form>
</div>
{% else %}
<div class="welcome-panel">
  <h2>Регистрация и проверка конвертов</h2>
  <div class="quick-actions">
    <button class="btn btn-primary" hx-post="/ui/envelopes" hx-target="#main-area" hx-swap="innerHTML"
            onclick="setMode('register')"><i data-lucide="package-plus"></i> Новый конверт</button>
    <button class="btn btn-dark" hx-get="/ui/verify" hx-target="#main-area" hx-swap="innerHTML"
            onclick="setMode('verify')"><i data-lucide="scan-line"></i> Верификация</button>
    <button class="btn btn-ghost" hx-get="/ui/dictionaries" hx-target="#main-area" hx-swap="innerHTML"
            onclick="setMode('idle')"><i data-lucide="book-open"></i> Справочники</button>
    {% if is_admin %}
    <button class="btn btn-ghost" hx-get="/ui/envelopes" hx-target="#main-area" hx-swap="innerHTML"
            onclick="setMode('idle')"><i data-lucide="archive"></i> Конверты</button>
    <button class="btn btn-ghost" hx-get="/ui/documents" hx-target="#main-area" hx-swap="innerHTML"
            onclick="setMode('idle')"><i data-lucide="file-text"></i> Документы</button>
    {% endif %}
  </div>
</div>
{% endif %}

{% endblock %}
