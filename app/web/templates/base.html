<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ТехноКонверт</title>
<link rel="stylesheet" href="/static/style.css">
<script src="/static/htmx.min.js" defer></script>
<script src="/static/app.js" defer></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js" defer onload="lucide.createIcons()"></script>
</head>
<body class="{% if operator %}is-authenticated{% else %}is-login{% endif %}" hx-boost="false">

<input id="scanner-input" type="text" autocomplete="off" tabindex="-1" aria-hidden="true">

{% if operator %}
<nav class="ta-navbar">
  <a class="ta-logo" href="/" title="На главную">
    <div class="ta-logo-icon">
      <img src="/static/icon.png" alt="">
    </div>
    <span class="ta-logo-text">ТехноКонверт</span>
  </a>

  <div class="ta-nav-items">
    <button class="ta-nav-item" type="button"
            hx-post="/ui/envelopes" hx-target="#main-area" hx-swap="innerHTML"
            onclick="setMode('register');setActiveTab(this)">
      <i data-lucide="package-plus"></i> Регистрация
    </button>
    <button class="ta-nav-item" type="button"
            hx-get="/ui/verify" hx-target="#main-area" hx-swap="innerHTML"
            onclick="setMode('verify');setActiveTab(this)">
      <i data-lucide="scan-line"></i> Верификация
    </button>
    {% if is_admin %}
    <button class="ta-nav-item" type="button"
            hx-get="/ui/envelopes" hx-target="#main-area" hx-swap="innerHTML"
            onclick="setMode('idle');setActiveTab(this)">
      <i data-lucide="archive"></i> Конверты
    </button>
    <button class="ta-nav-item" type="button"
            hx-get="/ui/documents" hx-target="#main-area" hx-swap="innerHTML"
            onclick="setMode('idle');setActiveTab(this)">
      <i data-lucide="file-text"></i> Документы
    </button>
    {% endif %}
  </div>

  <div class="ta-nav-right">
    <div class="ta-operator">
      <i data-lucide="circle-user"></i>
      <span>{{ operator }}</span>
    </div>
    {% if is_admin %}
    <span class="ta-admin-badge">Admin</span>
    <button class="ta-icon-btn" type="button"
            hx-get="/ui/admin" hx-target="#main-area" hx-swap="innerHTML"
            onclick="setMode('idle')"
            title="Админ-панель">
      <i data-lucide="shield-cog"></i>
    </button>
    {% endif %}
    <button class="ta-icon-btn" type="button"
            hx-get="/ui/settings-drawer" hx-target="#settings-drawer-root" hx-swap="innerHTML"
            title="Настройки">
      <i data-lucide="settings-2"></i>
    </button>
    <button class="ta-icon-btn" type="button"
            hx-post="/ui/operator/clear" hx-target="body" hx-swap="outerHTML"
            title="Выйти">
      <i data-lucide="log-out"></i>
    </button>
  </div>
</nav>
{% endif %}

<main class="main-content" id="main-area">
  {% block content %}{% endblock %}
</main>
<div id="settings-drawer-root"></div>

<script>
function setActiveTab(el) {
  document.querySelectorAll('.ta-nav-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
}
document.addEventListener('DOMContentLoaded', () => {
  if (typeof lucide !== 'undefined') lucide.createIcons();
});
document.body.addEventListener('htmx:afterSwap', () => {
  if (typeof lucide !== 'undefined') lucide.createIcons();
});
</script>
</body>
</html>
