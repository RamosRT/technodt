{# Verification documents table #}
<table class="doc-table">
  <thead>
    <tr>
      <th class="col-num">#</th>
      <th>Вид документа</th>
      <th>Номер</th>
      <th>Дата</th>
      <th class="col-status">Статус</th>
    </tr>
  </thead>
  <tbody>
    {% for doc in documents %}
    <tr id="vrow-{{ doc.id }}" class="{{ 'scan-flash' if doc.just_scanned else '' }}">
      <td class="col-num text-muted">{{ loop.index }}</td>
      <td>{{ doc.doc_kind }}</td>
      <td class="font-mono">{{ doc.doc_number }}</td>
      <td>{{ doc.doc_date.strftime('%d.%m.%Y') }}</td>
      <td>
        {% if doc.scanned_at_verification %}
        <span class="scan-status-ok"><i data-lucide="circle-check"></i> Отсканирован</span>
        {% else %}
        <span class="scan-status-pending"><i data-lucide="clock-3"></i> Ожидание</span>
        {% endif %}
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
